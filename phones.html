<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Выбор телефона с #FVPhone</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header class="header">
        <h1>Найди свой идеальный телефон с #FVPhone</h1>
    </header>
    <div class="search-container">
        <input type="text" id="searchInput" placeholder="Поиск" class="search-input">
        <button id="searchBtn" class="search-button">Найти</button>
    </div>

    <div class="tabs-container">
        <div id="home" class="tab-pane active">
            <div id="phoneCards" class="phones-container">
                <!-- Здесь будут карточки телефонов -->
            </div>
        </div>
        <div id="search" class="tab-pane">
            <p class="search-message">Используйте поиск сверху для нахождения телефона.</p>
        </div>
        <div id="top" class="tab-pane">
            <div id="topPhonesGrid" class="phones-container">
                <!-- Здесь будут карточки топовых телефонов -->
            </div>
        </div>
    </div>

    <nav class="bottom-nav">
        <a href="#" class="nav-item left active" data-tab="home">Главная</a>
        <a href="#" class="nav-item center" data-tab="search">Поиск</a>
        <a href="#" class="nav-item right" data-tab="top">Топы</a>
    </nav>

    <script src="script.js"></script>
</body>
</html>
